# Application environment type.
# CLI: --env_type
# Env: TTS_ENV_TYPE
env_type: development

# URI for the Wyoming server (tcp://host:port).
# CLI: --uri
# Env: TTS_URI
uri: tcp://127.0.0.1:10200

# Zeroconf discovery name. Empty string disables.
# CLI: --zeroconf
# Env: TTS_ZEROCONF
zeroconf: silero-tts

# Enable audio streaming.
# CLI: --streaming / --no-streaming
# Env: TTS_STREAMING
streaming: true

# Timeout for inference of one sentence in seconds.
# CLI: --inference_timeout
# Env: TTS_INFERENCE_TIMEOUT
inference_timeout: 5

# Frame duration in milliseconds.
# CLI: --frame_duration_ms
# Env: TTS_FRAME_DURATION_MS
frame_duration_ms: 50

# Audio sample rate in Hz (8000, 16000, 24000, 48000).
# CLI: --sample_rate
# Env: TTS_SAMPLE_RATE
sample_rate: 48000

# Maximum number of models to cache in memory.
# CLI: --max_models
# Env: TTS_MAX_MODELS
max_models: 2

# Maximum concurrent sentences per model.
# CLI: --max_concurrent_sentences_per_model
# Env: TTS_MAX_CONCURRENT_SENTENCES_PER_MODEL
max_concurrent_sentences_per_model: 2

# Maximum character count per text sentence for TTS processing.
# CLI: --max_sentence_chars
# Env: TTS_MAX_SENTENCE_CHARS
max_sentence_chars: 140

# Directory for downloaded Silero .pt model files.
# CLI: --models_dir
# Env: TTS_MODELS_DIR
models_dir: models/silero

# Local path to the voice/model mapping configuration file.
# CLI: --data_yml_path
# Env: TTS_DATA_YML_PATH
data_yml_path: data/data.yml

# URL to the Silero models.yml registry file.
# CLI: --models_yml_url
# Env: TTS_MODELS_YML_URL
models_yml_url: https://raw.githubusercontent.com/snakers4/silero-models/refs/heads/master/models.yml

# SHA-256 hash of the Silero models.yml file for integrity verification. Set empty to skip validation.
# CLI: --models_yml_hash
# Env: TTS_MODELS_YML_HASH
models_yml_hash: ""

# Text normalization settings.
# Env only (not available via CLI).
normalization:
  # Timeout for input text normalization in seconds.
  # Env: TTS_NORMALIZATION__TIMEOUT
  timeout: 5

  # Maximum concurrent sentences per request for normalization.
  # Env: TTS_NORMALIZATION__MAX_CONCURRENT_SENTENCES_PER_REQUEST
  max_concurrent_sentences_per_request: 2

  # Plain text normalization settings.
  text:
    # Enable plain text normalization.
    # Env: TTS_NORMALIZATION__TEXT__ENABLED
    enabled: true

    # Normalizer type (simple, llm).
    # Env: TTS_NORMALIZATION__TEXT__TYPE
    type: simple

    # Per-locale LLM prompts for text normalization (config.yml only).
    prompts:
      ru_RU:
        text: |
          Ты — инструмент подготовки текста для русского TTS.
          Твоя единственная задача — заменить цифры словами, раскрыть сокращения (т.е., т.д.) и перевести латиницу в кириллическое звучание (Apple -> Эппл).
          
          ЖЕСТКОЕ ПРАВИЛО:
          1. Обычные русские слова изменяться НЕ ДОЛЖНЫ. Не меняй их падежи, склонения, времена и окончания. Оставляй их ровно в том виде, в каком они написаны.
          2. Не занимайся лемматизацией и не пересказывай текст.
          3. Выдавай ТОЛЬКО обработанный текст, без каких-либо комментариев.
        model: qwen3.5:4b

  # SSML normalization settings.
  ssml:
    # Enable SSML markup normalization.
    # Env: TTS_NORMALIZATION__SSML__ENABLED
    enabled: false

    # Normalizer type (simple, llm).
    # Env: TTS_NORMALIZATION__SSML__TYPE
    type: simple

    # Per-locale LLM prompts for SSML normalization.
    # prompts:
    #   en_US:
    #     text: Normalize english text for TTS...
    #     model: qwen3.5:4b

# PyTorch computing engine settings.
# Note: num_threads x num_interop_threads <= physical cores.
torch:
  # Device to run TTS model on (cpu, cuda, xpu).
  # CLI: --torch_device
  # Env: TTS_TORCH__DEVICE
  device: cpu

  # Number of PyTorch intra-op threads.
  # CLI: --torch_num_threads
  # Env: TTS_TORCH__NUM_THREADS
  num_threads: 4

  # Number of PyTorch inter-op threads.
  # CLI: --torch_num_interop_threads
  # Env: TTS_TORCH__NUM_INTEROP_THREADS
  num_interop_threads: 1

  # Flush denormal floats for performance.
  # CLI: --torch_flush_denormal / --no-torch_flush_denormal
  # Env: TTS_TORCH__FLUSH_DENORMAL
  flush_denormal: true

# OpenAI-compatible API settings for LLM-based normalization.
openai:
  # Base URL for OpenAI-compatible API.
  # CLI: --openai_base_url
  # Env: TTS_OPENAI__BASE_URL (fallback: OPENAI_BASE_URL)
  base_url: ""

  # API key for OpenAI-compatible API.
  # CLI: --openai_api_key
  # Env: TTS_OPENAI__API_KEY (fallback: OPENAI_API_KEY)
  api_key: ""
